name: CI

on:
  push:
    branches: ["main", "development", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  integration:
    name: Integration Tests (AVR)
    runs-on: ubuntu-22.04  # 22.04 has avr-gcc 10.x; ubuntu-latest (24.04) only has 7.3.0
    permissions:
      contents: read

    steps:
      - name: Checkout pymcu-avr
        uses: actions/checkout@v4
        with:
          path: pymcu-avr

      # Checkout monorepo to build pymcuc (compiler binary).
      # TODO: replace with `pip install pymcu-compiler` once published to PyPI.
      - name: Checkout pymcu monorepo
        uses: actions/checkout@v4
        with:
          repository: PyMCU/PyMCU
          ref: development  # TODO: remove after PR #34 is merged to main
          path: pymcu
          submodules: recursive

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AVR system toolchain
        run: sudo apt-get install -y --no-install-recommends gcc-avr avr-libc binutils-avr

      - name: Build pymcuc compiler
        working-directory: pymcu
        run: |
          dotnet publish src/compiler/PyMCU.csproj \
            -c Release -o ../pymcu-avr/build/bin --nologo

      - name: Build pymcuc-avr backend CLI
        working-directory: pymcu-avr
        run: |
          dotnet publish src/csharp/cli/PyMCU.Backend.AVR.Cli.csproj \
            -c Release -o build/bin --nologo

      - name: Install Python dependencies
        working-directory: pymcu-avr
        run: |
          uv venv .venv
          uv pip install --python .venv pymcu-sdk
          uv pip install --python .venv -e ../pymcu/lib  # use development stdlib (has all fixes)
          uv pip install --python .venv pymcu-avr-toolchain
          uv pip install --python .venv -e ../pymcu
          uv pip install --python .venv -e . --no-deps
          uv pip install --python .venv -e ../pymcu/external/pymcu-micropython
          uv pip install --python .venv -e ../pymcu/external/pymcu-circuitpython

      - name: Configure environment
        working-directory: pymcu-avr
        run: |
          echo "$GITHUB_WORKSPACE/pymcu-avr/.venv/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/pymcu-avr/build/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/pymcu-avr/.venv" >> $GITHUB_ENV

      # pymcu-avr-toolchain downloads avr-gcc 15.2.0. The wheel binary has hardcoded
      # libexec/ prefix. Fix: set GCC_EXEC_PREFIX to the toolchain root so avr-gcc
      # finds its helpers (collect2, cc1, etc.) at the extracted location.
      - name: Pre-download toolchain and set GCC_EXEC_PREFIX
        working-directory: pymcu-avr
        run: |
          # get_bin_dir() prints download progress to stdout; tail -1 gets just the path
          BIN_DIR=$("$GITHUB_WORKSPACE/pymcu-avr/.venv/bin/python3" -c \
            "import pymcu_avr_toolchain; print(pymcu_avr_toolchain.get_bin_dir())" | tail -1)
          TOOLCHAIN_ROOT=$(dirname "$BIN_DIR")
          echo "Toolchain root: $TOOLCHAIN_ROOT"
          echo "GCC_EXEC_PREFIX=$TOOLCHAIN_ROOT/" >> "$GITHUB_ENV"
          "$BIN_DIR/avr-gcc" --version || echo "avr-gcc cannot run (expected, relocation issue)"

      - name: Diagnose avr-gcc
        working-directory: pymcu-avr
        run: |
          BIN=$("$GITHUB_WORKSPACE/pymcu-avr/.venv/bin/python3" -c \
            "import pymcu_avr_toolchain; print(pymcu_avr_toolchain.get_bin_dir())" | tail -1)
          echo "=== cache bin dir: $BIN ==="
          ls -la "$BIN" | head -20
          echo "=== avr-gcc version ==="
          "$BIN/avr-gcc" --version || echo "exit: $? (cannot run)"
          file "$BIN/avr-gcc" || true
          echo "=== /usr/bin/avr-gcc version ==="
          /usr/bin/avr-gcc --version
          echo "=== test link with /usr/bin/avr-gcc ==="
          echo 'int main(void) { return 0; }' | /usr/bin/avr-gcc -x c - -mmcu=atmega328p -o /dev/null 2>&1 || echo "exit: $?"

      - name: Restore integration test packages
        working-directory: pymcu-avr
        run: dotnet restore tests/integration/PyMCU.IntegrationTests.csproj --nologo

      - name: Run integration tests
        working-directory: pymcu-avr
        run: |
          dotnet test tests/integration/PyMCU.IntegrationTests.csproj \
            --no-restore \
            --logger "trx;LogFileName=integration-results.trx" \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120s \
            --results-directory test-results \
            --nologo \
            -- NUnit.NumberOfTestWorkers=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: pymcu-avr/test-results/
          retention-days: 15
