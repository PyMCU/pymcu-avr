name: CI

on:
  push:
    branches: ["main", "development", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # Toolchain supply-chain smoke test: runs on all target platforms.
  # Verifies that pymcu-avr-toolchain installs correctly and that the full
  # compile → link → objcopy pipeline works without system AVR tools.
  # ---------------------------------------------------------------------------
  build:
    name: Build C# (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout pymcu-avr
        uses: actions/checkout@v4
        with:
          path: pymcu-avr

      - name: Checkout pymcu monorepo
        uses: actions/checkout@v4
        with:
          repository: PyMCU/PyMCU
          ref: development  # TODO: remove after PR #34 is merged to main
          path: pymcu
          submodules: false

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Build pymcuc compiler
        shell: bash
        working-directory: pymcu
        run: dotnet publish src/compiler/PyMCU.csproj -c Release -o ../pymcu-avr/build/bin --nologo

      - name: Build pymcuc-avr backend CLI
        shell: bash
        working-directory: pymcu-avr
        run: dotnet publish src/csharp/cli/PyMCU.Backend.AVR.Cli.csproj -c Release -o build/bin --nologo

  # ---------------------------------------------------------------------------
  # Toolchain supply-chain smoke test: runs on all target platforms.
  # Verifies that pymcu-avr-toolchain installs correctly and that the full
  # compile → link → objcopy pipeline works without system AVR tools.
  # ---------------------------------------------------------------------------
  toolchain-smoke:
    name: Toolchain smoke (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-arm64
            runner: macos-latest
          - name: windows-x64
            runner: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout pymcu-avr
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          # Disable package cache so the latest published pymcu-avr-toolchain
          # is always installed, not a stale cached copy.
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install toolchain + test deps
        run: |
          uv venv .venv
          uv pip install --python .venv pymcu-avr-toolchain pytest

      - name: Run toolchain smoke tests
        run: uv run --python .venv --no-project pytest tests/toolchain/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Unit tests for the C# AVR backend (codegen, linear scan, peephole).
  # Requires pymcu sibling checkout for the compiler/IR project references.
  # ---------------------------------------------------------------------------
  unit:
    name: Unit Tests (.NET)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout pymcu-avr
        uses: actions/checkout@v4
        with:
          path: pymcu-avr

      - name: Checkout pymcu monorepo
        uses: actions/checkout@v4
        with:
          repository: PyMCU/PyMCU
          ref: development  # TODO: remove after PR #34 is merged to main
          path: pymcu
          submodules: false

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore packages
        working-directory: pymcu-avr
        run: dotnet restore tests/unit/PyMCU.AVR.UnitTests.csproj --nologo

      - name: Run unit tests
        working-directory: pymcu-avr
        run: |
          dotnet test tests/unit/PyMCU.AVR.UnitTests.csproj \
            --no-restore \
            --logger "trx;LogFileName=unit-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory test-results \
            --nologo

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: pymcu-avr/test-results/
          retention-days: 15

  # ---------------------------------------------------------------------------
  # Full integration tests (AVR simulator). Linux only — simulator runs only on
  # Linux and requires the full compiler + Python environment.
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests (AVR)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout pymcu-avr
        uses: actions/checkout@v4
        with:
          path: pymcu-avr

      # Checkout monorepo to build pymcuc (compiler binary).
      # TODO: replace with `pip install pymcu-compiler` once published to PyPI.
      - name: Checkout pymcu monorepo
        uses: actions/checkout@v4
        with:
          repository: PyMCU/PyMCU
          ref: development  # TODO: remove after PR #34 is merged to main
          path: pymcu
          submodules: recursive

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build pymcuc compiler
        working-directory: pymcu
        run: |
          dotnet publish src/compiler/PyMCU.csproj \
            -c Release -o ../pymcu-avr/build/bin --nologo

      - name: Build pymcuc-avr backend CLI
        working-directory: pymcu-avr
        run: |
          dotnet publish src/csharp/cli/PyMCU.Backend.AVR.Cli.csproj \
            -c Release -o build/bin --nologo

      - name: Install Python dependencies
        working-directory: pymcu-avr
        run: |
          uv venv .venv
          uv pip install --python .venv pymcu-sdk
          uv pip install --python .venv -e ../pymcu/lib  # use development stdlib (has all fixes)
          uv pip install --python .venv pymcu-avr-toolchain
          uv pip install --python .venv -e ../pymcu
          uv pip install --python .venv -e . --no-deps
          uv pip install --python .venv -e ../pymcu/external/pymcu-micropython
          uv pip install --python .venv -e ../pymcu/external/pymcu-circuitpython

      - name: Configure environment
        working-directory: pymcu-avr
        run: |
          echo "$GITHUB_WORKSPACE/pymcu-avr/.venv/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/pymcu-avr/build/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/pymcu-avr/.venv" >> $GITHUB_ENV

      # Pre-seed the toolchain cache. get_tool() triggers the auto-download from
      # GitHub Releases (same as the stub's public API), and _fetch.py applies
      # execute bits and as/ld symlinks automatically. No manual chmod needed.
      - name: Pre-seed AVR toolchain cache
        working-directory: pymcu-avr
        run: |
          "$GITHUB_WORKSPACE/pymcu-avr/.venv/bin/python3" -c "
          import pymcu_avr_toolchain as tc
          print('avr-gcc ->', tc.get_tool('avr-gcc'))
          print('avr-as  ->', tc.get_tool('avr-as'))
          print('avr-objcopy ->', tc.get_tool('avr-objcopy'))
          "

      - name: Restore integration test packages
        working-directory: pymcu-avr
        run: dotnet restore tests/integration/PyMCU.IntegrationTests.csproj --nologo

      - name: Run integration tests
        working-directory: pymcu-avr
        run: |
          dotnet test tests/integration/PyMCU.IntegrationTests.csproj \
            --no-restore \
            --logger "trx;LogFileName=integration-results.trx" \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120s \
            --results-directory test-results \
            --nologo \
            -- NUnit.NumberOfTestWorkers=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: pymcu-avr/test-results/
          retention-days: 15
