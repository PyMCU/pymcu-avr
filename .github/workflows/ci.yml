name: CI

on:
  push:
    branches: ["main", "development", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  integration:
    name: Integration Tests (AVR)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout pymcu-avr
        uses: actions/checkout@v4
        with:
          path: pymcu-avr

      # Checkout monorepo to build pymcuc (compiler binary).
      # TODO: replace with `pip install pymcu-compiler` once published to PyPI.
      - name: Checkout pymcu monorepo
        uses: actions/checkout@v4
        with:
          repository: PyMCU/PyMCU
          ref: development  # TODO: remove after PR #34 is merged to main
          path: pymcu

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AVR system toolchain
        run: sudo apt-get install -y --no-install-recommends gcc-avr avr-libc binutils-avr

      - name: Build pymcuc compiler
        working-directory: pymcu
        run: |
          dotnet publish src/compiler/PyMCU.csproj \
            -c Release -o ../pymcu-avr/build/bin --nologo

      - name: Build pymcuc-avr backend CLI
        working-directory: pymcu-avr
        run: |
          dotnet publish src/csharp/cli/PyMCU.Backend.AVR.Cli.csproj \
            -c Release -o build/bin --nologo

      - name: Install Python dependencies
        working-directory: pymcu-avr
        run: |
          uv venv .venv
          uv pip install --python .venv pymcu-sdk pymcu-stdlib
          uv pip install --python .venv pymcu-avr-toolchain
          uv pip install --python .venv -e ../pymcu
          uv pip install --python .venv -e . --no-deps

      - name: Configure environment
        working-directory: pymcu-avr
        run: |
          echo "$GITHUB_WORKSPACE/pymcu-avr/.venv/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/pymcu-avr/build/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/pymcu-avr/.venv" >> $GITHUB_ENV

      # pymcu-avr-toolchain downloads avr-gcc 15.2.0 on first use (relocation issue).
      # Overwrite that cache with system avr-gcc so tests use a known-working linker.
      - name: Seed toolchain cache with system avr-gcc
        working-directory: pymcu-avr
        run: |
          CACHE_KEY=$("$GITHUB_WORKSPACE/pymcu-avr/.venv/bin/python3" -c \
            "from importlib.metadata import version; print(version('pymcu-avr-toolchain'))")
          CACHE_BIN="$HOME/.pymcu/tools/linux-x86_64/pymcu-avr-toolchain/$CACHE_KEY/bin"
          mkdir -p "$CACHE_BIN"
          for tool in avr-gcc avr-as avr-g++ avr-ld avr-ar avr-objcopy avr-objdump avr-nm avr-strip avr-size avr-ranlib; do
            [ -f "/usr/bin/$tool" ] && cp "/usr/bin/$tool" "$CACHE_BIN/$tool" && chmod 755 "$CACHE_BIN/$tool"
          done
          echo "$CACHE_KEY" > "$HOME/.pymcu/tools/linux-x86_64/pymcu-avr-toolchain/$CACHE_KEY/.sentinel"
          echo "Seeded $CACHE_BIN with system avr-gcc"
          ls "$CACHE_BIN"

      - name: Restore integration test packages
        working-directory: pymcu-avr
        run: dotnet restore tests/integration/PyMCU.IntegrationTests.csproj --nologo

      - name: Run integration tests
        working-directory: pymcu-avr
        run: |
          dotnet test tests/integration/PyMCU.IntegrationTests.csproj \
            --no-restore \
            --logger "trx;LogFileName=integration-results.trx" \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120s \
            --results-directory test-results \
            --nologo \
            -- NUnit.NumberOfTestWorkers=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: pymcu-avr/test-results/
          retention-days: 15
